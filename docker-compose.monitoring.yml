# Monitoring overlay — Loki + Grafana for log aggregation
#
# Prerequisites:
#   docker plugin install grafana/loki-docker-driver:latest --alias loki --grant-all-permissions
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d

services:
  app:
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        mode: non-blocking
        max-buffer-size: "5m"
        loki-retries: "3"

  db:
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        mode: non-blocking
        max-buffer-size: "5m"
        loki-retries: "3"

  loki:
    image: grafana/loki:3.4
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.6.0
    ports:
      - "3001:3001"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASS:-admin}
      - GF_SERVER_PROTOCOL=${GRAFANA_PROTOCOL:-http}
      - GF_SERVER_HTTP_PORT=3001
      - GF_SERVER_CERT_FILE=${TLS_CERT:-}
      - GF_SERVER_CERT_KEY=${TLS_KEY:-}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - loki
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q --no-check-certificate http://localhost:3001/api/health || wget --spider -q --no-check-certificate https://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  loki-data:
  grafana-data:
